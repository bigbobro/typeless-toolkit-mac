<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Typeless 多账号管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg:#f6f5f2; --surf:#fffefb; --panel:#fbfaf6;
    --ink:#1c1e22; --mut:#6b6e74; --faint:#9a9c9f; --line:#e4e2db; --line2:#efeee9;
    --grn:#0e7c5b; --grn-d:#0c6b4e; --grn-t:#e7f2ec; --grn-line:#bfe0d3;
    --amber:#b4740b; --amber-t:#fbf1df; --amber-line:#ecdcbc;
    --red:#c0392b; --red-t:#f7e9e6; --red-line:#e3c3bd;
    --accent:var(--grn);
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,"Courier New",monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:var(--mono); -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1180px; margin:0 auto; padding:24px 20px 60px; }
  header { margin-bottom:8px; }
  header h1 { font-size:20px; font-weight:700; margin:0; letter-spacing:-.01em; }
  header .sub { color:var(--mut); font-size:13px; margin-top:6px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  /* ===== 悬停说明 tooltip ===== */
  [data-tip]{ position:relative; }
  [data-tip]::after{
    content:attr(data-tip); position:absolute; bottom:calc(100% + 9px); left:50%; transform:translateX(-50%) translateY(4px);
    background:#1b1d21; color:#f4f3ef; font-size:12px; line-height:1.5; font-weight:400; letter-spacing:0;
    padding:8px 11px; border-radius:8px; white-space:normal; width:max-content; max-width:230px; text-align:left;
    opacity:0; visibility:hidden; transition:opacity .16s, transform .16s; z-index:200; pointer-events:none;
    box-shadow:0 10px 30px rgba(28,30,34,.28); font-family:var(--mono);
  }
  [data-tip]::before{ content:''; position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%) translateY(4px);
    border:5px solid transparent; border-top-color:#1b1d21; opacity:0; visibility:hidden; transition:.16s; z-index:200; pointer-events:none; }
  [data-tip]:hover::after,[data-tip]:hover::before{ opacity:1; visibility:visible; transform:translateX(-50%) translateY(0); }
  [data-tr]::after{ left:auto; right:0; transform:translateX(0) translateY(4px); }
  [data-tr]:hover::after{ transform:translateX(0); }
  [data-tr]::before{ left:auto; right:14px; }

  /* ===== 顶部“检测当前登录账号”：变可点胶囊 ===== */
  .chip { appearance:none; font:inherit; font-family:var(--mono); font-size:12px; font-weight:600; cursor:pointer;
    color:var(--grn); background:var(--grn-t); border:1px solid var(--grn-line); border-radius:7px; padding:5px 11px; transition:.14s; }
  .chip:hover { background:#d7ebe1; }
  .chip:focus-visible { outline:2px solid var(--grn); outline-offset:2px; }

  /* ===== 按钮 ===== */
  .btn { font:inherit; font-family:var(--mono); background:var(--surf); border:1px solid var(--line); color:var(--ink);
    padding:8px 13px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; transition:.13s;
    display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn:hover { border-color:var(--grn); color:var(--grn); background:var(--grn-t); }
  .btn:focus-visible { outline:2px solid var(--grn); outline-offset:2px; }
  .btn.primary { background:var(--grn); color:#fff; border-color:var(--grn); }
  .btn.primary:hover { background:var(--grn-d); color:#fff; }
  .btn.small { padding:6px 10px; font-size:12px; border-radius:7px; }
  .btn.danger { color:var(--red); border-color:var(--red-line); background:var(--surf); }
  .btn.danger:hover { background:var(--red-t); border-color:var(--red); color:var(--red); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 18px; align-items:center; }
  .toolbar .sep { width:1px; align-self:stretch; background:var(--line); margin:2px 4px; }

  /* ===== 顶部提示条 / 备份区 ===== */
  .banner { background:var(--grn-t); border:1px solid var(--grn-line); color:var(--grn-d); padding:10px 13px; border-radius:9px; font-size:12.5px; margin-bottom:16px; display:none; }
  .backup-panel { background:var(--surf); border:1px solid var(--line); border-radius:10px; padding:11px 13px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .backup-main { min-width:0; display:flex; align-items:center; gap:9px; flex-wrap:wrap; font-size:12.5px; }
  .backup-badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; background:var(--line2); color:var(--mut); border:1px solid var(--line); }
  .backup-badge.ok { background:var(--grn-t); color:var(--grn-d); border-color:var(--grn-line); }
  .backup-badge.warn { background:var(--amber-t); color:var(--amber); border-color:var(--amber-line); }
  .backup-badge.err { background:var(--red-t); color:var(--red); border-color:var(--red-line); }
  .backup-text { font-weight:700; }
  .backup-meta { color:var(--mut); font-size:11.5px; }
  .backup-sensitive { color:var(--red); font-size:11.5px; font-weight:600; }
  .backup-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

  /* ===== 账号卡片（记录条） ===== */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; align-items:stretch; }
  .card { background:var(--surf); border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; transition:.14s; position:relative; display:flex; flex-direction:column; }
  .card:hover { border-color:#c9c6bd; box-shadow:0 10px 26px -18px rgba(28,30,34,.45); }
  .card.on { border-color:var(--grn); box-shadow:0 0 0 1px var(--grn); }
  .card .chead { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:12px 13px; border-bottom:1px dashed var(--line); }
  .card .cid { min-width:0; }
  .card .nrow { display:flex; align-items:center; gap:7px; min-width:0; }
  .card .nick { font-size:14px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card .curmark { flex:none; font-size:10px; font-weight:700; color:#fff; background:var(--grn); border-radius:5px; padding:2px 7px; letter-spacing:.04em; white-space:nowrap; }
  .card .email { color:var(--mut); font-size:11.5px; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card .flag { flex:none; margin-top:1px; font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    color:var(--amber); background:var(--amber-t); border:1px solid var(--amber-line); padding:2px 7px; border-radius:5px; }
  .card .flag.bad { color:var(--red); background:var(--red-t); border-color:var(--red-line); }
  .card .cbody { padding:13px 13px 0; display:flex; flex-direction:column; flex:1; }
  .qrow { display:flex; justify-content:space-between; align-items:baseline; font-size:12px; color:var(--mut); }
  .qrow b { color:var(--ink); font-weight:700; font-variant-numeric:tabular-nums; }
  .qtrack { position:relative; height:12px; background:var(--line2); border:1px solid var(--line); border-radius:6px; overflow:hidden; margin:8px 0 9px; }
  .qtrack > i { position:absolute; left:0; top:0; bottom:0; background:var(--grn); border-radius:5px; transition:width .3s; }
  .qtrack.warn > i { background:var(--amber); }
  .qtrack.over > i { background:var(--red); }
  .mini { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:7px; overflow:hidden; margin-top:2px; }
  .mini .m { background:var(--surf); padding:8px 9px; }
  .mini .m .k { font-size:10.5px; color:var(--faint); }
  .mini .m .v { font-size:14px; font-weight:700; margin-top:2px; font-variant-numeric:tabular-nums; }
  .cfoot { display:flex; align-items:center; gap:10px; margin-top:auto; padding:11px 0; border-top:1px dashed var(--line); font-size:11.5px; }
  .cfoot .snap { color:var(--mut); }
  .cbtn { font:inherit; font-family:var(--mono); margin-left:auto; font-size:11.5px; font-weight:600; cursor:pointer;
    color:var(--grn); background:var(--grn-t); border:1px solid var(--grn-line); border-radius:6px; padding:5px 10px; transition:.13s; }
  .cbtn:hover { background:#d7ebe1; }
  .cbtn.off { color:var(--faint); background:var(--line2); border-color:var(--line); cursor:not-allowed; }
  .copen { margin:0 -13px; padding:9px 13px; background:var(--panel); border-top:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
    font-size:11.5px; color:var(--mut); transition:.14s; }
  .copen span { transition:.14s; }
  .card:hover .copen { background:var(--grn-t); color:var(--grn-d); }
  .card:hover .copen .arw { transform:translateX(3px); }
  .empty { text-align:center; color:var(--mut); padding:50px 0; font-size:13px; }

  /* ===== 弹窗 ===== */
  .mask { position:fixed; inset:0; background:rgba(28,30,34,.4); display:none; align-items:center; justify-content:center; z-index:50; }
  .mask.on { display:flex; }
  .modal { background:var(--surf); border:1px solid var(--line); border-radius:12px; width:min(720px,94vw); max-height:88vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 30px 70px -25px rgba(28,30,34,.5); }
  .modal .hd { padding:14px 16px; border-bottom:1px dashed var(--line); display:flex; align-items:center; justify-content:space-between; background:var(--panel); }
  .modal .hd h3 { margin:0; font-size:15px; font-weight:700; }
  .modal .bd { padding:16px; overflow:auto; }
  /* 分段标签页 */
  .tabs { display:inline-flex; gap:2px; margin-bottom:14px; background:var(--line2); border:1px solid var(--line); padding:3px; border-radius:9px; }
  .tab { padding:6px 14px; border-radius:6px; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--mut); transition:.14s; user-select:none; }
  .tab:hover { color:var(--ink); }
  .tab.on { background:var(--surf); color:var(--grn); box-shadow:0 1px 2px rgba(28,30,34,.12); }
  /* 词库：筛选 + 多列紧凑网格 */
  .dicttools { display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  .wfilter { display:inline-flex; gap:2px; background:var(--line2); border:1px solid var(--line); padding:3px; border-radius:8px; flex:none; }
  .wf { font:inherit; font-family:var(--mono); font-size:12px; font-weight:600; cursor:pointer; color:var(--mut); background:none; border:0; padding:5px 12px; border-radius:6px; transition:.13s; }
  .wf:hover { color:var(--ink); }
  .wf.on { background:var(--surf); color:var(--grn); box-shadow:0 1px 2px rgba(28,30,34,.12); }
  .wcount { font-size:11.5px; color:var(--faint); margin-left:auto; }
  .wgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:8px; }
  .wcell { display:flex; align-items:center; gap:8px; padding:9px 10px; background:var(--surf); border:1px solid var(--line); border-radius:8px; font-size:13px; transition:.12s; }
  .wcell:hover { border-color:#c9c6bd; }
  .wcell .wicon { flex:none; font-size:12px; color:var(--amber); }
  .wcell .wicon.auto { color:var(--grn); }
  .wcell .wt { flex:1; min-width:0; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wcell .wdel { flex:none; color:var(--faint); cursor:pointer; opacity:0; font-size:12px; padding:2px 5px; border-radius:5px; transition:.12s; }
  .wcell:hover .wdel { opacity:1; }
  .wcell .wdel:hover { color:var(--red); background:var(--red-t); }
  /* 用量：可视化 */
  .uwrap { display:flex; flex-direction:column; gap:12px; }
  .uhero { display:flex; gap:18px; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px 18px; }
  .uring { flex:none; width:104px; height:104px; border-radius:50%; background:conic-gradient(var(--ringc,var(--grn)) calc(var(--p)*1%), var(--line2) 0); display:flex; align-items:center; justify-content:center; }
  .uring .uring-c { background:var(--surf); width:82px; height:82px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .uring .uring-c b { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1; }
  .uring .uring-c span { font-size:10.5px; color:var(--mut); margin-top:4px; }
  .uhero-side { flex:1; min-width:0; }
  .uhero-side .uline { display:flex; justify-content:space-between; align-items:baseline; font-size:13px; padding:5px 0; }
  .uhero-side .uline .mut { color:var(--mut); }
  .uhero-side .uline b { font-variant-numeric:tabular-nums; font-weight:700; }
  .ustats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .ustat { background:var(--surf); border:1px solid var(--line); border-radius:10px; padding:13px 14px; }
  .ustat .uk { font-size:11.5px; color:var(--mut); }
  .ustat .uv { font-size:22px; font-weight:700; margin-top:4px; font-variant-numeric:tabular-nums; }
  .ustat .uv em { font-size:13px; font-style:normal; color:var(--mut); font-weight:600; margin-left:2px; }
  .ustat .usub { font-size:11px; color:var(--faint); margin-top:3px; }
  .ustat.hl { background:var(--grn-t); border-color:var(--grn-line); }
  .ustat.hl .uk, .ustat.hl .uv { color:var(--grn-d); }
  .uspeed { height:6px; background:var(--line2); border-radius:4px; margin-top:9px; overflow:hidden; }
  .uspeed > i { display:block; height:100%; background:var(--grn); border-radius:4px; }
  input.fld { font-family:var(--mono); border:1px solid var(--line); border-radius:7px; padding:8px 11px; font-size:13px; width:100%; outline:none; background:var(--surf); color:var(--ink); }
  input.fld:focus { border-color:var(--grn); }
  input.fld::placeholder { color:var(--faint); }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:11.5px; color:var(--mut); margin-bottom:5px; }
  .statbox { background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:6px 14px; }
  .statbox .line { display:flex; justify-content:space-between; font-size:13px; padding:9px 0; border-bottom:1px dashed var(--line); }
  .statbox .line:last-child { border:none; }
  .statbox .line b { font-variant-numeric:tabular-nums; }
  .ring { width:88px; height:88px; border-radius:50%; background:conic-gradient(var(--grn) calc(var(--p)*1%), var(--line2) 0); display:flex; align-items:center; justify-content:center; margin:0 auto 8px; }
  .ring span { background:var(--surf); width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  .master-edit textarea, textarea#masterArea { width:100%; min-height:180px; font-family:var(--mono); border:1px solid var(--line); border-radius:8px; padding:10px; font-size:13px; resize:vertical; background:var(--surf); color:var(--ink); outline:none; }
  textarea#masterArea:focus { border-color:var(--grn); }
  .modal-actions { margin-top:16px; padding-top:14px; border-top:1px dashed var(--line); display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .modal-actions .spacer { flex:1; }
  /* 警告条(补丁被还原等) */
  .banner.warn { background:var(--amber-t); border-color:var(--amber-line); color:var(--amber); display:none; align-items:center; gap:10px; justify-content:space-between; }
  .banner.warn .x { cursor:pointer; font-weight:700; opacity:.7; padding:0 4px; }
  .banner.warn .x:hover { opacity:1; }
  /* 自检进行中 / 正常 */
  .banner.check, .banner.ok { background:var(--grn-t); border-color:var(--grn-line); color:var(--grn-d); display:none; align-items:center; gap:10px; }
  .spin { width:13px; height:13px; flex:none; border:2px solid rgba(14,124,91,.25); border-top-color:var(--grn-d); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  /* 开机自动检测进度条 */
  .banner.boot { flex-direction:column; align-items:stretch; justify-content:center; gap:8px; min-height:52px; background:var(--grn-t); border-color:var(--grn-line); color:var(--grn-d); }
  .boot-bar { height:6px; background:rgba(14,124,91,.16); border-radius:5px; overflow:hidden; }
  .boot-bar > i { display:block; height:100%; width:0; background:var(--grn-d); border-radius:5px; transition:width .35s ease; }
  .boot-txt { display:flex; align-items:center; gap:8px; font-size:12.5px; white-space:nowrap; }
  .boot-txt .boot-step { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
  .boot-txt .cnt { flex:none; font-variant-numeric:tabular-nums; opacity:.65; }
  /* 诊断面板 */
  .diag-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line); font-size:13px; }
  .diag-row:last-child { border:none; }
  .diag-row .ddot { width:9px; height:9px; border-radius:50%; flex:none; }
  .diag-row .ddot.ok { background:var(--grn); }
  .diag-row .ddot.warn { background:var(--amber); }
  .diag-row .ddot.bad { background:var(--red); }
  .diag-row .ddot.neutral { background:var(--faint); }
  .diag-row .dk { width:130px; flex:none; color:var(--mut); }
  .diag-row .dv { flex:1; min-width:0; word-break:break-all; }
  .diag-row .dv.mut { color:var(--faint); }
  .diag-row .dv b { color:var(--ink); font-weight:600; }
  .diag-row .dv .warn { color:var(--amber); font-weight:700; }
  .diag-row .dv .bad { color:var(--red); font-weight:700; }
  .diag-row.in { animation:rowIn .28s ease; }
  @keyframes rowIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
  .diag-prog { margin-bottom:14px; }
  .diag-prog-bar { height:8px; background:var(--line2); border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .diag-prog-bar > i { display:block; height:100%; width:0; background:var(--grn); border-radius:5px; transition:width .35s ease; }
  .diag-prog-txt { margin-top:9px; font-size:12.5px; color:var(--mut); display:flex; align-items:center; gap:8px; }
  .diag-prog-txt .cnt { margin-left:auto; font-variant-numeric:tabular-nums; color:var(--faint); }
  .diag-prog-txt.done { color:var(--grn-d); font-weight:600; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1b1d21; color:#f4f3ef; padding:10px 18px; border-radius:9px; font-size:13px; font-family:var(--mono); z-index:80; opacity:0; transition:.2s; pointer-events:none; }
  .toast.on { opacity:1; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; animation:none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Typeless 多账号管理</h1>
      <div class="sub">周额度 8,000 字/号 · 词库跨账号同步 · <button class="chip" id="curLink" data-tip="检测当前 Typeless 正登录哪个账号，并在下方高亮">检测当前登录账号</button></div>
    </div>
  </header>

  <div class="banner warn" id="patchBanner"></div>
  <div class="banner" id="banner"></div>

  <div class="backup-panel" id="backupPanel">
    <div class="backup-main">
      <span class="backup-badge" id="backupBadge">检查中</span>
      <span class="backup-text" id="backupText">正在检查本地运行数据备份…</span>
      <span class="backup-meta" id="backupMeta"></span>
      <span class="backup-sensitive">备份包包含 Typeless 登录信息,请勿随意分享</span>
    </div>
    <div class="backup-actions">
      <button class="btn small" data-tip="把当前账号、登录态、主词库存一份本地备份" onclick="backupNow()">立即备份</button>
      <button class="btn small" data-tip="导出一个可迁移的备份包文件（含登录信息，勿分享）" onclick="exportBackup()">导出备份包</button>
      <button class="btn small" data-tr data-tip="选择备份包文件，覆盖恢复账号 / 快照 / 主词库" onclick="pickBackupFile()">导入恢复</button>
    </div>
    <input id="backupFile" type="file" accept="application/json,.json" style="display:none" onchange="restoreBackupFile(this)">
  </div>

  <div class="toolbar">
    <button class="btn primary" data-tip="以调试端口启动 Typeless，管理器才能抓账号、读用量" onclick="launch()">⏻ 启动 Typeless</button>
    <button class="btn" data-tip="抓取当前 Typeless 已登录账号的凭证并加入管理器（会重载一次主窗口）" onclick="addAccount()">＋ 添加当前账号</button>
    <button class="btn" data-tip="重新拉取所有账号的用量、词库数、token 状态" onclick="loadAccounts()">↻ 全部刷新</button>
    <button class="btn" data-tip="所有账号词库互相补齐，并汇总进主词库" onclick="syncAll()">⇄ 全部同步</button>
    <button class="btn" data-tip="编辑作为同步基准的主词库（一行一个词）" onclick="openMaster()">✎ 主词库编辑</button>
    <button class="btn" data-tip="体检：Typeless 路径 / 调试端口 / 当前登录 / 补丁状态 / 数据目录一览" onclick="openDiag()">◇ 诊断</button>
    <span class="sep"></span>
    <button class="btn danger" data-tip="重置设备 ID 回到登录页，以便注册新账号；当前账号会登出（有快照可切回）" onclick="resetDevice()">⊘ 解除设备限制</button>
    <button class="btn danger" data-tr data-tip="给 Typeless 打补丁去掉升级/会员弹窗；App 自动更新后需重打" onclick="patchPaywall()">⊘ 解除弹窗提示</button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<!-- 账号详情 -->
<div class="mask" id="detailMask" onclick="if(event.target===this)closeModal('detailMask')">
  <div class="modal">
    <div class="hd"><h3 id="dTitle">账号详情</h3><button class="btn small" data-tr data-tip="关闭" onclick="closeModal('detailMask')">✕</button></div>
    <div class="bd">
      <div class="tabs">
        <div class="tab on" onclick="selTab(this,'dict')">词库</div>
        <div class="tab" onclick="selTab(this,'usage')">用量</div>
        <div class="tab" onclick="selTab(this,'personal')">个性化</div>
      </div>
      <div id="tab-dict">
        <div style="display:flex;gap:8px;margin-bottom:10px;">
          <input class="fld" id="wordInput" placeholder="输入新词,回车添加" style="flex:1" onkeydown="if(event.key==='Enter')addWord()">
          <button class="btn small primary" data-tr data-tip="把这个词加入当前账号的词库" onclick="addWord()">加词</button>
        </div>
        <div class="dicttools">
          <div class="wfilter">
            <button class="wf on" onclick="setDictFilter(this,'all')">全部</button>
            <button class="wf" onclick="setDictFilter(this,'auto')">自动</button>
            <button class="wf" onclick="setDictFilter(this,'manual')">手动</button>
          </div>
          <input class="fld" id="dictSearch" placeholder="筛选词条…" oninput="renderDict()" style="flex:1;min-width:130px;">
          <span class="wcount" id="wordCount"></span>
        </div>
        <div id="wordList"></div>
      </div>
      <div id="tab-usage" style="display:none"></div>
      <div id="tab-personal" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn small primary" data-tip="把该账号词库与主词库双向补齐" onclick="syncOne()">同步本账号</button>
        <button class="btn small" data-tip="仅把主词库里缺的词导入该账号（单向）" onclick="importMaster()">从主词库导入</button>
        <button class="btn small" data-tip="从另一个账号复制词库到该账号" onclick="copyFrom()">从其他号复制</button>
        <button class="btn small" data-tip="把当前 Typeless 登录态存为该账号快照，供切换用" onclick="saveSnap()">更新快照</button>
        <span class="spacer"></span>
        <button class="btn small danger" data-tr data-tip="仅从管理器移除该账号，不影响 Typeless 本身" onclick="rmAccount()">移除账号</button>
      </div>
    </div>
  </div>
</div>

<!-- 主词库编辑 -->
<div class="mask" id="masterMask" onclick="if(event.target===this)closeModal('masterMask')">
  <div class="modal">
    <div class="hd"><h3>主词库（各账号并集）</h3><button class="btn small" data-tr data-tip="关闭" onclick="closeModal('masterMask')">✕</button></div>
    <div class="bd master-edit">
      <div class="sub" style="color:var(--mut);font-size:12px;margin-bottom:8px;line-height:1.6;">一行一个词。保存后会作为所有账号同步的基准（同步时把缺失的词导入各账号，并吸收各账号已有词）。</div>
      <textarea id="masterArea"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
        <button class="btn small primary" data-tip="保存主词库；作为所有账号同步的基准" onclick="saveMaster()">保存</button>
        <span id="masterCnt" style="font-size:12px;color:var(--mut);"></span>
      </div>
    </div>
  </div>
</div>

<!-- 添加账号 -->
<div class="mask" id="addMask" onclick="if(event.target===this)closeModal('addMask')">
  <div class="modal" style="width:min(440px,94vw)">
    <div class="hd"><h3>添加账号</h3><button class="btn small" data-tr data-tip="关闭" onclick="closeModal('addMask')">✕</button></div>
    <div class="bd">
      <div id="addStep1">
        <div style="font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:12px;">先在 Typeless 里登录要添加的账号，然后点下方按钮。工具会自动抓取当前登录账号的凭证（会重载一次主窗口）。</div>
        <button class="btn primary" data-tip="抓取当前 Typeless 登录账号的凭证（会重载一次主窗口）" onclick="doCapture()" id="capBtn">抓取当前账号</button>
      </div>
      <div id="addStep2" style="display:none">
        <div class="field"><label>昵称</label><input class="fld" id="addNick"></div>
        <div class="field"><label>邮箱</label><input class="fld" id="addEmail" readonly></div>
        <div class="field"><label>套餐 / user_id</label><input class="fld" id="addMeta" readonly></div>
        <button class="btn primary" data-tip="保存该账号到管理器，并自动把主词库导入此号" onclick="saveAccount()">保存</button>
        <span id="addExist" style="font-size:12px;color:var(--amber);margin-left:10px;"></span>
      </div>
    </div>
  </div>
</div>

<!-- 诊断 / 健康检查 -->
<div class="mask" id="diagMask" onclick="if(event.target===this)closeModal('diagMask')">
  <div class="modal">
    <div class="hd"><h3>诊断 / 健康检查</h3><button class="btn small" data-tr data-tip="关闭" onclick="closeModal('diagMask')">✕</button></div>
    <div class="bd">
      <div id="diagBody"><div class="empty">检查中…</div></div>
      <div style="margin-top:14px"><button class="btn small" data-tip="重新检查" onclick="renderDiag()">↻ 重新检查</button></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const api = (p, opt={}) => fetch(p, { headers:{'Content-Type':'application/json'}, ...opt }).then(r=>r.json());
let ACCOUNTS = [], CUR_ID = null, curDetail = null, curWords = [], dictFilter = 'all';

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),1800); }
function openModal(id){ document.getElementById(id).classList.add('on'); }
function closeModal(id){ document.getElementById(id).classList.remove('on'); }
function fmtTime(s){
  if(!s) return '';
  try { return new Date(s).toLocaleString('zh-CN', { hour12:false }); }
  catch(e){ return s; }
}
function renderBackupStatus(d){
  const badge=document.getElementById('backupBadge');
  const text=document.getElementById('backupText');
  const meta=document.getElementById('backupMeta');
  badge.className='backup-badge';
  if(!d || d.status==='no_data'){
    badge.textContent='暂无数据';
    text.textContent='还没有账号/profile/主词库需要备份';
    meta.textContent='';
    return;
  }
  if(d.backed_up){
    badge.textContent='已备份';
    badge.classList.add('ok');
    text.textContent='本地运行数据已有当前备份';
  }else{
    badge.textContent='未备份';
    badge.classList.add('err');
    text.textContent='账号、登录态或主词库有变更,建议立即备份';
  }
  const latest=d.latest_backup ? `最近备份 ${fmtTime(d.latest_backup.mtime)}` : '没有备份记录';
  const changed=d.latest_data_mtime ? `数据更新 ${fmtTime(d.latest_data_mtime)}` : '';
  meta.textContent=[latest, changed].filter(Boolean).join(' · ');
}
async function loadBackupStatus(){
  try{
    const r=await api('/api/backup-status');
    if(r.status==='OK') renderBackupStatus(r.data);
  }catch(e){}
}
async function backupNow(){
  toast('备份中…');
  const r=await api('/api/backup-runtime',{method:'POST'});
  if(r.status==='OK'){
    renderBackupStatus(r.data);
    toast(r.msg||'已备份');
  }else{
    toast(r.msg||'备份失败');
  }
}
function exportBackup(){
  if(!confirm('导出的备份包包含 Typeless 登录信息、账号 token 和 profile 快照。\n\n不要随意分享给他人。确认导出吗?')) return;
  window.location.href='/api/backup-export';
  toast('已开始导出备份包');
  setTimeout(loadBackupStatus, 1200);
}
function pickBackupFile(){
  const input=document.getElementById('backupFile');
  input.value='';
  input.click();
}
async function restoreBackupFile(input){
  const file=input.files&&input.files[0];
  if(!file) return;
  if(!confirm('导入备份会覆盖当前管理器里的账号、profile 快照和主词库。\n\n备份包可能包含 Typeless 登录信息和账号 token,只导入你信任的备份包。恢复前会先自动备份当前数据。继续吗?')) return;
  try{
    const text=await file.text();
    const bundle=JSON.parse(text);
    toast('恢复中…');
    const r=await api('/api/backup-restore',{method:'POST',body:JSON.stringify({bundle})});
    if(r.status==='OK'){
      renderBackupStatus(r.data);
      toast('备份已恢复');
      await loadAccounts();
      detectCurrent();
    }else{
      toast(r.msg||'恢复失败');
    }
  }catch(e){
    toast('恢复失败:备份包格式不正确');
  }
}

async function launch(){ const r=await api('/api/launch',{method:'POST'}); toast(r.msg||'已启动'); }
async function loadAccounts(){
  const g=document.getElementById('grid'); g.innerHTML='<div class="empty">加载中…</div>';
  const r=await api('/api/accounts');
  if(r.status!=='OK'){ g.innerHTML='<div class="empty">'+r.msg+'</div>'; return; }
  ACCOUNTS=r.data||[];
  render();
  loadBackupStatus();
}
function pct(v,l){ return l? Math.min(100, Math.round(v/l*100)):0; }
function render(){
  const g=document.getElementById('grid');
  if(!ACCOUNTS.length){ g.innerHTML='<div class="empty">还没有账号。点「添加当前账号」开始（先在 Typeless 登录该号）。</div>'; return; }
  g.innerHTML=ACCOUNTS.map(a=>{
    const live=a.live||{};
    const u=live.usage||{};
    const ok=u.week_word_usage_value!=null; // liveStatus 失败时 usage 为空,显示 — 而非误导的 0
    const used=ok?u.week_word_usage_value:0, lim=u.week_word_usage_limit||8000;
    const p=pct(used,lim); const over=ok&&used>lim;
    const valid=live.token_valid!==false;
    const cur=a.user_id===CUR_ID;
    return `<div class="card ${cur?'on':''}" onclick="openDetail('${a.user_id}')">
      <div class="chead">
        <div class="cid">
          <div class="nrow"><span class="nick">${esc(a.nickname)}</span>${cur?'<span class="curmark">当前</span>':''}</div>
          <div class="email">${esc(a.email||'')}</div>
        </div>
        <span class="flag ${valid?'':'bad'}">${valid?(a.role||'未知'):'token失效'}</span>
      </div>
      <div class="cbody">
        <div class="qrow"><span>本周额度</span><b>${ok?used.toLocaleString():'—'} / ${lim.toLocaleString()}</b></div>
        <div class="qtrack ${over?'over':(p>80?'warn':'')}"><i style="width:${ok?(over?100:p):0}%"></i></div>
        <div class="qrow"><span>剩余字数</span><b>${ok?(lim-used).toLocaleString():'—'}</b></div>
        <div class="mini">
          <div class="m"><div class="k">词库词条</div><div class="v">${live.dict_count??'-'}</div></div>
          <div class="m"><div class="k">个性化</div><div class="v">${Math.round((live.personal?.total_learning_ratio||0)*100)}%</div></div>
          <div class="m"><div class="k">总字数</div><div class="v">${(u.total_words||0).toLocaleString()}</div></div>
        </div>
        <div class="cfoot">
          <span class="snap">${a.has_snapshot?'快照已存':'未存快照'}</span>
          ${a.has_snapshot
            ? `<button class="cbtn" data-tr data-tip="还原该账号登录态快照并重启 Typeless" onclick="event.stopPropagation();switchTo('${a.user_id}')">切换到此号</button>`
            : `<span class="cbtn off" data-tr data-tip="该账号还没有快照，先在 Typeless 登录该号后点「更新快照」">切换到此号</span>`}
        </div>
        <div class="copen"><span>查看词库 / 用量 / 个性化</span><span class="arw">›</span></div>
      </div>
    </div>`;
  }).join('');
}
function esc(s){ return (s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

async function openDetail(id){
  const a=ACCOUNTS.find(x=>x.user_id===id); if(!a) return;
  curDetail=a;
  document.getElementById('dTitle').textContent=a.nickname+' · '+(a.email||'');
  openModal('detailMask');
  selTab(document.querySelector('.tab'),'dict');
  const r=await api('/api/accounts/'+encodeURIComponent(id)+'/dictionary');
  curWords = r.data?.words||[];
  dictFilter='all';
  document.querySelectorAll('.wf').forEach((b,i)=>b.classList.toggle('on', i===0));
  document.getElementById('dictSearch').value=''; renderDict();
  renderUsage(a); renderPersonal(a);
}
function selTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); el.classList.add('on');
  ['dict','usage','personal'].forEach(t=>document.getElementById('tab-'+t).style.display = t===tab?'block':'none');
}
function setDictFilter(el,f){
  dictFilter=f;
  document.querySelectorAll('.wf').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderDict();
}
function renderDict(){
  const q=(document.getElementById('dictSearch').value||'').trim().toLowerCase();
  let ws=curWords.filter(w=>!q||(w.term||'').toLowerCase().includes(q));
  if(dictFilter==='auto') ws=ws.filter(w=>w.auto);
  else if(dictFilter==='manual') ws=ws.filter(w=>!w.auto);
  const cnt=document.getElementById('wordCount');
  if(cnt) cnt.textContent=ws.length+' 词';
  document.getElementById('wordList').innerHTML = ws.length
    ? '<div class="wgrid">'+ws.map(w=>`<div class="wcell">
        <span class="wicon ${w.auto?'auto':''}" data-tip="${w.auto?'自动添加':'手动添加'}">${w.auto?'✦':'✎'}</span>
        <span class="wt" title="${esc(w.term)}">${esc(w.term)}</span>
        <span class="wdel" data-tr data-tip="从该账号词库删除此词" onclick="delWord('${esc(w.term)}')">✕</span>
      </div>`).join('')+'</div>'
    : '<div class="empty" style="padding:20px">无匹配词条</div>';
}
function renderUsage(a){
  const u=a.live?.usage||{};
  const ok=u.week_word_usage_value!=null;
  const used=ok?u.week_word_usage_value:0, lim=u.week_word_usage_limit||8000;
  const rem=lim-used, p=pct(used,lim), over=ok&&used>lim;
  const ringc=over?'var(--red)':(p>80?'var(--amber)':'var(--grn)');
  const secs=Math.round(u.total_audio_seconds||0);
  const mins=Math.round(secs/60);
  const saved=u.mins_saved||0;
  const wpm=u.avg_wpm||0;
  const spd=Math.min(100, Math.round(wpm/250*100));
  document.getElementById('tab-usage').innerHTML=`<div class="uwrap">
    <div class="uhero">
      <div class="uring" style="--p:${ok?(over?100:p):0};--ringc:${ringc}"><div class="uring-c"><b>${ok?p+'%':'—'}</b><span>本周已用</span></div></div>
      <div class="uhero-side">
        <div class="uline"><span class="mut">本周已用</span><b>${ok?used.toLocaleString():'—'} / ${lim.toLocaleString()} 字</b></div>
        <div class="uline"><span class="mut">剩余</span><b style="color:${over?'var(--red)':'var(--grn-d)'}">${ok?rem.toLocaleString():'—'} 字</b></div>
      </div>
    </div>
    <div class="ustats">
      <div class="ustat"><div class="uk">总听写字数</div><div class="uv">${(u.total_words||0).toLocaleString()}</div><div class="usub">累计</div></div>
      <div class="ustat"><div class="uk">录音总时长</div><div class="uv">${mins.toLocaleString()} <em>分钟</em></div><div class="usub">${secs.toLocaleString()} 秒</div></div>
      <div class="ustat"><div class="uk">平均语速</div><div class="uv">${wpm} <em>wpm</em></div><div class="uspeed"><i style="width:${spd}%"></i></div></div>
      <div class="ustat hl"><div class="uk">已节省</div><div class="uv">${(saved/60).toFixed(1)} <em>小时</em></div><div class="usub">约 ${Math.round(saved).toLocaleString()} 分钟</div></div>
    </div>
  </div>`;
}
function renderPersonal(a){
  const p=a.live?.personal||{}; const ratio=p.total_learning_ratio||0;
  document.getElementById('tab-personal').innerHTML=`<div style="text-align:center">
    <div class="ring" style="--p:${Math.round(ratio*100)}"><span>${Math.round(ratio*100)}%</span></div>
    <div style="color:var(--mut);font-size:12px">个性化学习进度</div>
    <div style="font-size:13px;margin-top:6px">${p.enabled?'已启用':'未启用'} · ${(p.category_stats||[]).length} 个学习类别</div>
  </div>`;
}
async function addWord(){
  const t=document.getElementById('wordInput').value.trim(); if(!t||!curDetail) return;
  const r=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/word',{method:'POST',body:JSON.stringify({term:t})});
  if(r.status==='OK'){ toast('已添加'); document.getElementById('wordInput').value=''; const d=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/dictionary'); curWords=d.data?.words||[]; renderDict(); } else toast('添加失败: '+(r.msg||'未知原因'));
}
async function delWord(term){
  if(!curDetail) return; if(!confirm('删除「'+term+'」?')) return;
  const r=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/word?term='+encodeURIComponent(term),{method:'DELETE'});
  if(r.status==='OK'){ toast('已删除'); curWords=curWords.filter(w=>w.term!==term); renderDict(); } else toast('删除失败: '+(r.msg||'未知原因'));
}
async function syncOne(){
  if(!curDetail) return; toast('同步中…');
  const r=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/sync',{method:'POST'});
  if(r.status==='OK') toast(`同步完成:导出 ${r.data.exported} / 导入 ${r.data.imported} / 主库 ${r.data.master_count}`);
  else toast('失败: '+(r.msg||''));
  await loadAccounts();
}
async function syncAll(){
  toast('全部同步中…');
  const r=await api('/api/sync-all',{method:'POST'});
  if(r.status==='OK'){ const d=r.data||[]; toast(`完成 ${d.length} 个账号`); await loadAccounts(); }
}
async function switchTo(id){
  const a=ACCOUNTS.find(x=>x.user_id===id); if(!a) return;
  if(!confirm('切换到「'+a.nickname+'」?将关闭并重启 Typeless。')) return;
  toast('切换中…');
  const r=await api('/api/accounts/'+encodeURIComponent(id)+'/switch',{method:'POST'});
  toast(r.msg||'已切换');
  setTimeout(()=>{ loadAccounts(); detectCurrent(); }, 6000);
}
async function resetDevice(){
  if(!confirm('解除设备限制?\n\n将重置设备 ID(删凭据+device.cache+user-data+清登录态),Typeless 重启到登录页,即可注册新账号。\n当前账号会被登出(若已存快照可随时切回)。')) return;
  toast('重置中…');
  const r=await api('/api/reset-device',{method:'POST'});
  toast(r.msg||'已重置');
  loadBackupStatus();
  setTimeout(()=>{ loadAccounts(); detectCurrent(); }, 7000);
}
// 解除升级/会员弹窗(等长字节补丁 app.asar + 应用完整性哈希)
async function patchPaywall(){
  // 先查状态:已打过就提示,不再动文件
  let st={};
  try{ st=await api('/api/paywall-status'); }catch(e){}
  if(st.data && st.data.patched){
    toast('已是无弹窗补丁版,无需重复操作');
    return;
  }
  if(!confirm('解除升级弹窗?\n\n将修改 app.asar 与 Info.plist 完整性记录(等长字节替换 gn(x)→(0,x),并重新签名 Typeless.app)。\n首次会自动备份 app.asar.bak / Info.plist.bak。\nTypeless 会先关闭,打完自动重启。\n注意:Typeless 自动更新会还原补丁,届时需重打。')) return;
  toast('打补丁中…');
  const r=await api('/api/patch-paywall',{method:'POST'});
  if(r.status==='OK'){
    toast(r.data?.already?'已是补丁版,无需重打':'补丁完成,已重启 Typeless');
  }else{
    toast(r.msg||'打补丁失败');
  }
  loadBackupStatus();
  setTimeout(()=>{ detectCurrent(); }, 7000);
}
async function importMaster(){
  if(!curDetail) return; toast('导入主词库中…');
  const r=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/import-master',{method:'POST'});
  if(r.status==='OK') toast(`主词库 ${r.data.master} 条,新导入 ${r.data.imported} 条`);
  else toast('失败: '+(r.msg||''));
  await loadAccounts();
}
async function copyFrom(){
  if(!curDetail) return;
  const src=ACCOUNTS.find(x=>x.user_id!==curDetail.user_id);
  if(!src) { toast('没有其他账号可复制'); return; }
  const opts=ACCOUNTS.filter(x=>x.user_id!==curDetail.user_id).map(x=>x.nickname).join(', ');
  const name=prompt('从哪个账号复制词库到「'+curDetail.nickname+'」?\n('+opts+')');
  const srcAcc=ACCOUNTS.find(x=>x.nickname===name && x.user_id!==curDetail.user_id);
  if(!srcAcc){ toast('已取消或未找到'); return; }
  toast('复制中…');
  const r=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/copy-from/'+encodeURIComponent(srcAcc.user_id),{method:'POST'});
  if(r.status==='OK') toast(`源 ${r.data.src_count} 条,新导入 ${r.data.imported} 条`);
  else toast('失败: '+(r.msg||''));
  await loadAccounts();
}
async function saveSnap(){
  if(!curDetail) return;
  const r=await api('/api/accounts/'+encodeURIComponent(curDetail.user_id)+'/snapshot',{method:'POST'});
  toast(r.msg||'已保存'); await loadAccounts(); loadBackupStatus();
}
function rmAccount(){ if(!curDetail) return; if(!confirm('从管理器移除「'+curDetail.nickname+'」?(不影响 Typeless)')) return; fetch('/api/accounts/'+encodeURIComponent(curDetail.user_id),{method:'DELETE'}).then(()=>{closeModal('detailMask');loadAccounts();loadBackupStatus();toast('已移除');}); }

function addAccount(){ openModal('addMask'); document.getElementById('addStep1').style.display='block'; document.getElementById('addStep2').style.display='none'; }
async function doCapture(){
  const btn=document.getElementById('capBtn'); btn.disabled=true; btn.textContent='抓取中…(主窗口将重载)';
  const r=await api('/api/capture',{method:'POST'});
  btn.disabled=false; btn.textContent='抓取当前账号';
  if(r.status!=='OK'){ toast('抓取失败: '+(r.msg||'')); return; }
  const d=r.data; window._cap=d;
  document.getElementById('addStep1').style.display='none';
  document.getElementById('addStep2').style.display='block';
  document.getElementById('addNick').value=d.nickname||d.email||'';
  document.getElementById('addEmail').value=d.email||'';
  document.getElementById('addMeta').value=(d.role||'')+' · '+d.user_id;
  const exist=ACCOUNTS.find(x=>x.user_id===d.user_id);
  document.getElementById('addExist').textContent=exist?'该账号已存在,保存将更新 token':'';
}
async function saveAccount(){
  const d=window._cap; if(!d) return;
  const r=await api('/api/accounts',{method:'POST',body:JSON.stringify({
    user_id:d.user_id,
    nickname:document.getElementById('addNick').value.trim(),
    email:document.getElementById('addEmail').value.trim()||d.email,
    role:d.role,
    token:d.token,
    captured_at:d.captured_at,
    user_info:d.user_info
  })});
  if(r.status!=='OK'){ toast('保存失败: '+(r.msg||'未知原因')); return; }
  closeModal('addMask'); toast('已保存,正在迁移主词库到此号…');
  // 自动迁移:把主词库导入新账号
  const m=await api('/api/accounts/'+encodeURIComponent(d.user_id)+'/import-master',{method:'POST'});
  if(m.status==='OK') toast('添加完成,已导入 '+m.data.imported+' 个词');
  await loadAccounts(); loadBackupStatus();
}

async function openMaster(){
  const r=await api('/api/master');
  document.getElementById('masterArea').value=(r.data||[]).join('\n');
  document.getElementById('masterCnt').textContent=(r.data||[]).length+' 条';
  openModal('masterMask');
}
async function saveMaster(){
  const terms=document.getElementById('masterArea').value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
  const r=await api('/api/master',{method:'POST',body:JSON.stringify({terms})});
  if(r.status==='OK'){ document.getElementById('masterArea').value=r.data.join('\n'); document.getElementById('masterCnt').textContent=r.data.length+' 条'; toast('已保存'); loadBackupStatus(); }
  else toast('保存失败: '+(r.msg||'未知原因'));
}

function openDiag(){ openModal('diagMask'); renderDiag(); }
const diagSleep=ms=>new Promise(r=>setTimeout(r,ms));
function diagRow(dot,k,v,vcls){ return `<div class="diag-row in"><span class="ddot ${dot}"></span><span class="dk">${k}</span><span class="dv ${vcls||''}">${v}</span></div>`; }
function paywallRowHtml(pw){
  const reverted = pw.exists && pw.has_backup && !pw.patched;
  let dot='neutral', txt='未打补丁', cls='mut';
  if(pw.error){ dot='warn'; txt=esc(pw.error); cls='warn'; }
  else if(reverted){ dot='warn'; txt='<span class="warn">已被 Typeless 更新还原，需重打</span>'; cls=''; }
  else if(pw.patched){ dot='ok'; txt='<b>已打补丁</b>'; cls=''; }
  return `<div class="diag-row in"><span class="ddot ${dot}"></span><span class="dk">去弹窗补丁</span><span class="dv ${cls}">${txt}</span></div>`;
}
let diagRunning=false;
async function renderDiag(){
  if(diagRunning) return;            // 防重复触发
  diagRunning=true;
  const STEP_MS=380;
  const el=document.getElementById('diagBody');
  el.innerHTML='<div class="diag-prog"><div class="diag-prog-bar"><i id="diagBar"></i></div>'
    +'<div class="diag-prog-txt" id="diagTxt"><span class="spin" id="diagSpin"></span><span id="diagStep">开始体检…</span><span class="cnt" id="diagCnt"></span></div></div>'
    +'<div id="diagRows"></div>';
  const bar=document.getElementById('diagBar'), stepEl=document.getElementById('diagStep'),
        cntEl=document.getElementById('diagCnt'), rowsEl=document.getElementById('diagRows'),
        txtEl=document.getElementById('diagTxt'), spin=document.getElementById('diagSpin');
  const r=await api('/api/diagnostics');
  if(r.status!=='OK'){ el.innerHTML='<div class="empty">'+(r.msg||'检查失败')+'</div>'; diagRunning=false; return; }
  const d=r.data, t=d.typeless;
  const cur=(CUR_ID && ACCOUNTS.length)?ACCOUNTS.find(x=>x.user_id===CUR_ID):null;
  const bk=d.data.backup||{};
  const steps=[
    {label:'检查 Typeless 应用', row:()=>diagRow(t.app_found?'ok':'bad','Typeless 应用', t.app_found?`<b>已找到</b> ${esc(t.app_path)}`:'未找到 — 请确认已安装 Typeless', t.app_found?'mut':'bad')},
    {label:'检查 app.asar', row:()=>diagRow(t.asar_found?'ok':'bad','app.asar', t.asar_found?'已找到':'未找到（去弹窗补丁不可用）', t.asar_found?'mut':'bad')},
    {label:'检查用户数据目录', row:()=>diagRow(t.user_data_found?'ok':'warn','用户数据目录', t.user_data_found?esc(t.user_data_dir):'未找到', t.user_data_found?'mut':'warn')},
    {label:'连接调试端口 '+d.cdp.port, row:()=>diagRow(d.cdp.reachable?'ok':'warn','调试端口 '+d.cdp.port, d.cdp.reachable?'<b>已连接</b>':'未连接 — 点「⏻ 启动 Typeless」', d.cdp.reachable?'':'warn')},
    {label:'确认当前登录账号', row:()=>diagRow(cur?'ok':'neutral','当前登录', cur?`<b>${esc(cur.nickname||cur.email||CUR_ID)}</b>`:(d.cdp.reachable?'以顶部「当前」为准':'未检测到（Typeless 未连接）'), cur?'':'mut')},
    {label:'读取 app.asar，检查去弹窗补丁（较慢，请稍候）', slow:true, row:async()=>{ let pw={}; try{ const pr=await api('/api/paywall-status'); pw=pr.data||{}; }catch(e){ pw={error:'检查失败'}; } return paywallRowHtml(pw); }},
    {label:'检查数据目录读写', row:()=>diagRow(d.data.writable?'ok':'bad','数据目录', `${esc(d.data.dir)}${d.data.writable?'':' <span class="bad">（不可写！）</span>'}`, d.data.writable?'mut':'')},
    {label:'统计已收录账号', row:()=>diagRow('neutral','已收录账号', `<b>${d.data.accounts_count}</b> 个`, '')},
    {label:'检查运行数据备份', row:()=>diagRow(bk.backed_up?'ok':'warn','运行数据备份', bk.backed_up?'已备份':'有变更，建议「立即备份」', bk.backed_up?'mut':'warn')},
  ];
  const N=steps.length;
  for(let i=0;i<N;i++){
    stepEl.textContent='正在'+steps[i].label+'…';
    cntEl.textContent=(i+1)+' / '+N;
    await diagSleep(steps[i].slow?120:STEP_MS);   // 先亮出“正在做什么”，再出结果
    const html=await steps[i].row();
    rowsEl.insertAdjacentHTML('beforeend', html);
    bar.style.width=Math.round((i+1)/N*100)+'%';
    if(!steps[i].slow) await diagSleep(90);
  }
  spin.style.display='none';
  txtEl.classList.add('done');
  stepEl.textContent='✓ 体检完成';
  cntEl.textContent=N+' / '+N;
  diagRunning=false;
}
// 开机自动检测:统一进度条,一步一步走,让用户看清正在做什么
async function bootDetect(){
  const b=document.getElementById('patchBanner');
  b.className='banner boot'; b.style.display='flex';
  b.innerHTML='<div class="boot-bar"><i id="bootBar"></i></div>'
    +'<div class="boot-txt"><span class="spin"></span><span class="boot-step" id="bootStep">开始检测…</span><span class="cnt" id="bootCnt">0 / 4</span></div>';
  const bar=()=>document.getElementById('bootBar'), stepEl=()=>document.getElementById('bootStep'), cntEl=()=>document.getElementById('bootCnt');
  let pw=null;
  const steps=[
    {label:'加载账号列表与用量', run:loadAccounts},
    {label:'检测当前登录账号（连接 Typeless，较慢）', run:detectCurrent},
    {label:'自检去弹窗补丁（读取 app.asar，较慢）', run:async()=>{ try{ const r=await api('/api/paywall-status'); pw=r.data||{}; }catch(e){ pw={error:1}; } }},
  ];
  const N=steps.length, TOTAL=N+1;   // 3 项检查 + 第 4 步“全部填满 = 检查完成”
  for(let i=0;i<N;i++){
    stepEl().textContent='正在'+steps[i].label+'…'; cntEl().textContent=(i+1)+' / '+TOTAL;
    try{ await Promise.all([ steps[i].run(), diagSleep(320) ]); }catch(e){}
    bar().style.width=Math.round((i+1)/TOTAL*100)+'%';   // 25 → 50 → 75
  }
  const reverted = pw && pw.exists && pw.has_backup && !pw.patched;
  if(reverted){
    b.className='banner warn'; b.style.display='flex';
    b.innerHTML='<span>⚠ 去弹窗补丁已被 Typeless 更新还原 — 点「⊘ 解除弹窗提示」可重打</span><span class="x" data-tip="忽略" onclick="this.parentElement.style.display=\'none\'">✕</span>';
  }else{
    b.className='banner boot done'; b.style.display='flex';   // 第 4 步:填满 100%
    b.innerHTML='<div class="boot-bar"><i style="width:100%"></i></div><div class="boot-txt"><span class="boot-step">✓ 检查完成</span><span class="cnt">'+TOTAL+' / '+TOTAL+'</span></div>';
    setTimeout(()=>{ if(b.classList.contains('done')) b.style.display='none'; }, 2200);
  }
}
async function detectCurrent(){
  const el=document.getElementById('curLink'); el.textContent='检测中…';
  const r=await api('/api/current');
  if(r.status!=='OK'){ el.textContent='未连接 Typeless'; el.style.opacity='.55'; toast('Typeless 未连接,点「⏻ 启动 Typeless」即可(自动带端口)'); return; }
  const d=r.data; CUR_ID=d.user_id;
  const matched=ACCOUNTS.find(x=>x.user_id===d.user_id);
  const b=document.getElementById('banner');
  b.style.display='block'; b.textContent='当前 Typeless 登录: '+(matched?matched.nickname+' ('+matched.email+')':d.email||d.user_id)+(matched?'':'  — 未收录,点「添加当前账号」加入');
  el.textContent=matched?('当前: '+matched.nickname):'检测当前登录账号';
  render();
}
document.getElementById('curLink').onclick=detectCurrent;

bootDetect();
</script>
